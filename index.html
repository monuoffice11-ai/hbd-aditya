<!DOCTYPE html>
<html lang="en">

<head>
	<title>Happy Birthday Aditya! 🎉</title>
	<meta charset="UTF-8" />
	<meta name="description" content="Birthday Gift for Aditya">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0, minimum-scale=1.0, maximum-scale=1.0">
	
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.1/css/bootstrap.min.css">
	<link rel="stylesheet" type="text/css" href="stylesheet.css">
	<link rel="stylesheet" type="text/css" href="loading.css">
	<link href='https://fonts.googleapis.com/css?family=Signika' rel='stylesheet' type='text/css'>
</head>

<body>
	<div class="loading"></div>
	
	<audio class="song" controls loop>
		<source src="hbd.mp3"></source>
	</audio>

	<div class="balloons text-center" id="b1"><h2 style="color:#F2B300;">A</h2></div>
	<div class="balloons text-center" id="b2"><h2 style="color:#0719D4;">D</h2></div>
	<div class="balloons text-center" id="b3"><h2 style="color:#D14D39;">I</h2></div>
	<div class="balloons text-center" id="b4"><h2 style="color:#8FAD00;">T</h2></div>
	<div class="balloons text-center" id="b5"><h2 style="color:#8377E4;">Y</h2></div>
	<div class="balloons text-center" id="b6"><h2 style="color:#99C96A;">A</h2></div>
	<div class="balloons text-center" id="b7"><h2 style="color:#20CFB4;">🎂</h2></div>

	<img src="Balloon-Border.png" width="100%" class="balloon-border">

	<div class="container">
		<div class="row">
			<div class="col-md-2 col-xs-2 bulb-holder"><div class="bulb" id="bulb_yellow"></div></div>
			<div class="col-md-2 col-xs-2 bulb-holder"><div class="bulb" id="bulb_red"></div></div>
			<div class="col-md-2 col-xs-2 bulb-holder"><div class="bulb" id="bulb_blue"></div></div>
			<div class="col-md-2 col-xs-2 bulb-holder"><div class="bulb" id="bulb_green"></div></div>
			<div class="col-md-2 col-xs-2 bulb-holder"><div class="bulb" id="bulb_pink"></div></div>
			<div class="col-md-2 col-xs-2 bulb-holder"><div class="bulb" id="bulb_orange"></div></div>
		</div>
		<div class="row"><div class="col-md-12 text-center"><img src="banner.png" class="bannar"></div></div>
		<div class="row cake-cover">
			<div class="col-md-12 text-center">
				<div class="cake">
					<div class="velas">
						<div class="fuego"></div><div class="fuego"></div><div class="fuego"></div><div class="fuego"></div><div class="fuego"></div>
					</div>
					<div class="cobertura"></div><div class="bizcocho"></div>
				</div>
			</div>
		</div>
		
		<div class="row message">
			<div class="col-md-12" id="storyMessages">
				<p>Today is a very special day...</p>
				<p>It's time for some celebration! 🎉</p>
				<p>May this new year of your life...</p>
				<p>Bring you immense success and happiness.</p>
				<p>Keep shining and working hard, Aditya.</p>
				<p>Wish you a fantastic year ahead! 🚀</p>
				<p>Once again...</p>
				<p>A very Happy Birthday, Aditya! 🎂✨</p>
			</div>
		</div>

		<div class="navbar navbar-fixed-bottom">
			<div class="row">
				<div class="col-md-6 text-center col-md-offset-3">
					<button class="btn btn-primary" id="turn_on">Turn On Lights</button>
					<button class="btn btn-primary" id="play">Play Music</button>
					<button class="btn btn-primary" id="bannar_coming">Let's Decorate</button>
					<button class="btn btn-primary" id="balloons_flying">Fly With Balloons</button>
					<button class="btn btn-primary" id="cake_fadein">Delicious Cake</button>
					<button class="btn btn-primary" id="light_candle">Light Candle</button>
					<button class="btn btn-primary" id="wish_message">Happy Birthday Aditya</button>
					<button class="btn btn-primary" id="story">A message for you</button>
				</div>
			</div>
		</div>
	</div>

	<script src="https://code.jquery.com/jquery-1.11.2.min.js"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.1/js/bootstrap.min.js"></script>
	<script src="effect.js"></script>

</html>
